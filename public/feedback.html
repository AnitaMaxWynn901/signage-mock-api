<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Smart Signage</title>
    <link rel="stylesheet" href="../style/base.css">
    <link rel="stylesheet" href="../style/components.css">
    <link rel="stylesheet" href="../style/pages.css">
</head>

<body>
    <div class="container">
        <div class="header-card">
            <h1>Send Feedback</h1>
            <p class="subtitle">Report an issue or send us your feedback</p>
        </div>

        <div id="successMessage" class="success-message" style="display: none;">
            <h3>✅ Success!</h3>
            <p>Your feedback has been submitted successfully.</p>
        </div>

        <div class="feedback-form">
            <form id="feedbackForm">
                <div class="form-group">
                    <label for="type">Type</label>
                    <select id="type" required>
                        <option value="">Select type...</option>
                        <option value="feedback">Feedback</option>
                        <option value="bug">Bug Report</option>
                        <option value="feature">Feature Request</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" placeholder="Brief description" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" placeholder="Describe your feedback or issue in detail..."
                        required></textarea>
                </div>

                <div class="form-group">
                    <label for="shop">Related Shop</label>
                    <select id="shop">
                        <option value="nimman-connex">Nimman Connex</option>
                        <option value="one-nimman">One Nimman</option>
                        <option value="maya-mall">MAYA Mall</option>
                        <option value="all">All Shops</option>
                    </select>
                </div>

                <button type="submit" class="btn" id="submitBtn">
                    Send Feedback
                </button>
            </form>
        </div>
    </div>

    <script src="../scripts/config.js"></script>
    <script src="../scripts/feedback.js"></script>
</body>

</html>
