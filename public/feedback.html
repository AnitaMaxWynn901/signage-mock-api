<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback - Smart Signage</title>
    <link rel="stylesheet" href="../style/base.css" />
    <link rel="stylesheet" href="../style/components.css" />
    <style>
        .feedback-wrap {
            max-width: 680px;
            margin: 0 auto;
        }

        .success-banner {
            background: #f0fdf4;
            border: 1px solid rgba(16, 185, 129, .28);
            border-radius: var(--radius);
            padding: 16px 18px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 12px;
        }

        .success-banner.show {
            display: flex;
        }

        .success-banner .icon {
            font-size: 22px;
            flex-shrink: 0;
        }

        .success-banner .text strong {
            display: block;
            font-size: 14px;
            font-weight: 800;
            color: #065f46;
        }

        .success-banner .text span {
            font-size: 13px;
            color: #047857;
        }

        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 900;
            color: var(--muted);
            letter-spacing: .10em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            font-family: var(--font);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            box-sizing: border-box;
        }

        .form-group textarea {
            min-height: 130px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: rgba(79, 70, 229, .5);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, .10);
            background: #fff;
        }

        .form-group .hint {
            font-size: 12px;
            color: var(--muted);
            margin-top: 6px;
            font-weight: 600;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            font-family: var(--font);
            transition: background 0.15s, transform 0.1s;
            margin-top: 4px;
        }

        .submit-btn:hover {
            background: #4338ca;
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        .submit-btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .history-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin-top: 4px;
        }

        .history-item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .history-subject {
            font-size: 13px;
            font-weight: 800;
            color: var(--text);
        }

        .history-date {
            font-size: 11px;
            color: var(--muted);
            font-weight: 600;
            white-space: nowrap;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 999px;
        }

        .status-pill.UNREAD {
            background: #fffbeb;
            color: #92400e;
            border: 1px solid rgba(245, 158, 11, .25);
        }

        .status-pill.REPLIED {
            background: #f0fdf4;
            color: #065f46;
            border: 1px solid rgba(16, 185, 129, .25);
        }

        .status-pill.CLOSED {
            background: var(--surface-2);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .history-message {
            font-size: 13px;
            color: var(--muted);
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .admin-reply-bubble {
            background: #eef2ff;
            border: 1px solid rgba(79, 70, 229, .15);
            border-radius: 10px;
            padding: 10px 12px;
            margin-top: 8px;
        }

        .admin-reply-bubble .reply-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 4px;
            letter-spacing: .06em;
            text-transform: uppercase;
        }

        .admin-reply-bubble .reply-text {
            font-size: 13px;
            color: var(--text);
            font-weight: 600;
            line-height: 1.5;
        }

        .empty-history {
            padding: 32px 16px;
            text-align: center;
            color: var(--muted);
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="feedback-wrap">
            <div class="header-card">
                <div class="shop-icon" id="shopIcon">S</div>
                <div class="shop-info">
                    <h1 id="shopName">Shop Feedback</h1>
                    <p class="subtitle">Send feedback or ask a question</p>
                </div>
                <div class="live-badge">Live</div>
            </div>

            <div class="success-banner" id="successBanner">
                <div class="icon">✅</div>
                <div class="text">
                    <strong>Message sent!</strong>
                    <span>We'll reply as soon as possible.</span>
                </div>
            </div>

            <div class="form-card">
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="subject" placeholder="e.g. Device not working, Change contact number..." />
                    <div class="hint">Brief description of your issue or question</div>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="message" placeholder="Describe your issue or question in detail..."></textarea>
                </div>
                <button class="submit-btn" id="submitBtn" onclick="submitFeedback()">Send Message</button>
            </div>

            <div class="section-header">My Previous Messages</div>
            <div class="history-card" id="historyContainer">
                <div class="empty-history">Loading...</div>
            </div>
        </div>
    </div>

    <script src="../scripts/config.js"></script>
    <script src="../scripts/feedback.js"></script>
</body>

</html>
