<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary - Smart Signage</title>
    <link rel="stylesheet" href="../style/base.css">
    <link rel="stylesheet" href="../style/components.css">
</head>

<body>
    <div class="container">
        <!-- Enhanced Header -->
        <div class="header-card">
            <div class="shop-icon" id="shopIcon">N</div>
            <div class="shop-info">
                <h1 id="shopName">Loading...</h1>
                <p class="subtitle" id="shopSubtitle">Retail Analytics Dashboard</p>
                <div class="header-meta">
                    <div>
                        <span>📅</span>
                        <span id="date">Loading...</span>
                    </div>
                    <div>
                        <span>🕐</span>
                        <span>Full Day Data</span>
                    </div>
                </div>
            </div>
            <div class="live-badge">Live</div>
        </div>

        <!-- Date Selector -->
        <div class="date-selector">
            <input type="date" id="dateInput">
        </div>

        <!-- Loading State -->
        <div id="loading" class="loading">
            <h2>📊 Loading Summary...</h2>
        </div>

        <!-- Error State -->
        <div id="error" class="error" style="display: none;">
            <h3>❌ Error</h3>
            <p id="errorMessage"></p>
        </div>

        <!-- Stats Container -->
        <div id="statsContainer" style="display: none;">
            <!-- District Total -->
            <div class="circular-stat mb-lg">
                <div class="circle">
                    <div class="circle-icon">🏙️</div>
                    <div class="circle-value" id="districtCount">-</div>
                </div>
                <div class="circle-label">DISTRICTS TOTAL<br>จำนวนผู้เยี่ยมชมทั้งหมด</div>
            </div>

            <!-- Other Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="icon">📍</div>
                    <div class="label">Area<br>พื้นที่</div>
                    <div class="value" id="areaCount">-</div>
                </div>

                <div class="stat-card">
                    <div class="icon">🏪</div>
                    <div class="label">Front Store<br>หน้าร้าน</div>
                    <div class="value" id="frontStore">-</div>
                </div>

                <div class="stat-card">
                    <div class="icon">🛍️</div>
                    <div class="label">In Store<br>ในร้าน</div>
                    <div class="value" id="inStore">-</div>
                </div>
            </div>
        </div>
    </div>

    <script src="../scripts/config.js"></script>
    <script src="../scripts/api.js"></script>
    <script src="../scripts/summary.js"></script>
</body>

</html>
