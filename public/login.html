<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Smart Signage</title>

    <link rel="stylesheet" href="../style/base.css" />
    <link rel="stylesheet" href="../style/components.css" />

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            padding: 20px;
        }

        .login-wrap {
            width: 100%;
            max-width: 400px;
        }

        /* Logo / brand */
        .brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            display: grid;
            place-items: center;
            font-size: 28px;
            margin: 0 auto 14px;
            box-shadow: 0 8px 24px rgba(79, 70, 229, .25);
        }

        .brand h1 {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -0.02em;
            margin: 0 0 4px;
        }

        .brand p {
            font-size: 13px;
            color: var(--muted);
            font-weight: 600;
            margin: 0;
        }

        /* Card */
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 28px 24px;
        }

        .login-card h2 {
            font-size: 16px;
            font-weight: 900;
            margin: 0 0 4px;
        }

        .login-card .sub {
            font-size: 13px;
            color: var(--muted);
            font-weight: 600;
            margin: 0 0 22px;
        }

        /* Form groups */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 900;
            color: var(--muted);
            letter-spacing: .10em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 13px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            font-family: var(--font);
            outline: none;
            box-sizing: border-box;
            transition: border-color .15s, box-shadow .15s;
        }

        .form-group input:focus {
            border-color: rgba(79, 70, 229, .5);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, .10);
            background: #fff;
        }

        .form-group input::placeholder {
            color: #c4c9d4;
            font-weight: 500;
        }

        .form-group .hint {
            font-size: 11px;
            color: var(--muted);
            font-weight: 600;
            margin-top: 6px;
        }

        /* Error message */
        .error-msg {
            background: #fff5f5;
            border: 1px solid rgba(239, 68, 68, .25);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 700;
            color: var(--danger);
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-msg.show {
            display: flex;
        }

        /* Submit button */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            font-family: var(--font);
            transition: background .15s, transform .1s;
            margin-top: 4px;
        }

        .login-btn:hover {
            background: #4338ca;
        }

        .login-btn:active {
            transform: translateY(1px);
        }

        .login-btn:disabled {
            opacity: .65;
            cursor: not-allowed;
        }

        /* Footer note */
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--muted);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="login-wrap">

        <div class="brand">
            <div class="brand-icon">📊</div>
            <h1>Smart Signage</h1>
            <p>Shop Dashboard</p>
        </div>

        <div class="login-card">
            <h2>Sign in to your dashboard</h2>
            <p class="sub">Enter your Shop ID and phone number to continue</p>

            <div class="error-msg" id="errorMsg">
                <span>⚠️</span>
                <span id="errorText">Shop ID or phone number is incorrect</span>
            </div>

            <div class="form-group">
                <label>Shop ID</label>
                <input type="text" id="shopId" placeholder="e.g. SH001" autocomplete="off"
                    autocapitalize="characters" />
                <div class="hint">Your shop ID provided by the admin</div>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phoneNumber" placeholder="e.g. 081-111-1111" autocomplete="off" />
                <div class="hint">Phone number registered with your shop</div>
            </div>

            <button class="login-btn" id="loginBtn" onclick="doLogin()">
                Sign In
            </button>
        </div>

        <div class="login-footer">
            Having trouble? Contact your area administrator.
        </div>

    </div>

    <script src="../scripts/config.js"></script>
    <script src="../scripts/login.js"></script>
</body>

</html>
