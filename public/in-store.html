<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Store - Smart Signage</title>
    <link rel="stylesheet" href="../style/base.css">
    <link rel="stylesheet" href="../style/components.css">
</head>

<body>
    <div class="container">
        <div class="header-card">
            <h1 id="shopName">Loading...</h1>
            <p class="subtitle" id="date">Fetching data...</p>
        </div>

        <div class="date-selector">
            <input type="date" id="dateInput">
        </div>

        <div id="loading" class="loading">
            <h2>🛍️ Loading In-Store Data...</h2>
        </div>

        <div id="error" class="error" style="display: none;">
            <h3>❌ Error</h3>
            <p id="errorMessage"></p>
        </div>

        <div id="statsContainer" style="display: none;">
            <div class="circular-stat mb-lg">
                <div class="circle">
                    <div class="circle-icon">🛍️</div>
                    <div class="circle-value" id="inStoreCount">-</div>
                </div>
                <div class="circle-label">IN-STORE VISITORS<br>จำนวนผู้เยี่ยมชมในร้าน</div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="icon">🏪</div>
                    <div class="label">Front Store<br>หน้าร้าน</div>
                    <div class="value" id="frontStoreCount">-</div>
                </div>

                <div class="stat-card">
                    <div class="icon">📊</div>
                    <div class="label">Conversion<br>อัตราเข้าร้าน</div>
                    <div class="value" id="conversionRate"
                        style="color: var(--success-color); font-size: var(--font-size-2xl);">-%</div>
                </div>
            </div>
        </div>
    </div>

    <script src="../scripts/config.js"></script>
    <script src="../scripts/api.js"></script>
    <script src="../scripts/in-store.js"></script>
</body>

</html>
