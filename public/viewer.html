<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer - Smart Signage</title>

    <link rel="stylesheet" href="../style/base.css">
    <link rel="stylesheet" href="../style/components.css">

    <style>
        .viewer-hero {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 24px;
            text-align: center;
            margin-bottom: 18px;
        }

        .viewer-total {
            font-size: 72px;
            font-weight: 900;
            color: #f97316;
        }

        .viewer-label {
            font-size: 13px;
            color: var(--muted);
            font-weight: 700;
        }

        .gender-bar {
            margin-top: 14px;
            height: 18px;
            background: #e5e7eb;
            border-radius: 999px;
            overflow: hidden;
            display: flex;
        }

        .gender-male {
            background: #3b82f6;
            height: 100%;
        }

        .gender-female {
            background: #ec4899;
            height: 100%;
        }

        .gender-row {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-weight: 700;
        }

        .age-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 16px;
        }

        .age-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
        }

        .age-value {
            font-size: 30px;
            font-weight: 900;
        }

        .age-percent {
            font-size: 12px;
            color: var(--muted);
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header-card">
            <div class="shop-icon" id="shopIcon">N</div>

            <div class="shop-info">
                <h1 id="shopName">Loading...</h1>
                <p class="subtitle">Viewer Analytics</p>

                <div class="header-meta">
                    <div>📅 <span id="date">Fetching...</span></div>
                    <div>🕐 Full Day Data</div>
                </div>
            </div>

            <div class="live-badge">Live</div>
        </div>

        <div class="date-selector">
            <input type="date" id="dateInput">
        </div>

        <div id="loading" class="loading">
            <h2>👁️ Loading Viewer Data...</h2>
        </div>

        <div id="error" class="error" style="display:none;">
            <h3>Error</h3>
            <p id="errorMessage"></p>
        </div>

        <div id="statsContainer" style="display:none;">

            <div class="section-header">Viewers</div>

            <div class="viewer-hero">
                <div class="viewer-label">Total viewers</div>
                <div class="viewer-total" id="totalValue">-</div>
                <div class="viewer-label">People</div>
            </div>

            <div class="section-header">Gender proportion</div>

            <div class="gender-bar">
                <div class="gender-male" id="maleBar"></div>
                <div class="gender-female" id="femaleBar"></div>
            </div>

            <div class="gender-row">
                <div style="color:#3b82f6">
                    ♂ Male: <span id="maleCount">-</span> (<span id="malePercent">-%</span>)
                </div>

                <div style="color:#ec4899">
                    ♀ Female: <span id="femaleCount">-</span> (<span id="femalePercent">-%</span>)
                </div>
            </div>

            <div class="section-header">Age groups</div>

            <div class="age-grid">

                <div class="age-card">
                    <div>Adult</div>
                    <div class="age-value" style="color:#16a34a" id="adultCount">-</div>
                    <div class="age-percent" id="adultPercent">-%</div>
                </div>

                <div class="age-card">
                    <div>Elderly</div>
                    <div class="age-value" style="color:#6b7280" id="elderlyCount">-</div>
                    <div class="age-percent" id="elderlyPercent">-%</div>
                </div>

                <div class="age-card">
                    <div>Children</div>
                    <div class="age-value" style="color:#f59e0b" id="childCount">-</div>
                    <div class="age-percent" id="childPercent">-%</div>
                </div>

            </div>

        </div>

    </div>

    <script src="../scripts/config.js"></script>
    <script src="../scripts/api.js"></script>
    <script src="../scripts/viewer.js"></script>

</body>

</html>
